source_language: "go"
target_language: "rust"
tool_name: "oxidizer"
tool_source_projects_path: "data/tool_projects/oxidizer"
tool_target_projects_path: "data/tool_projects/oxidizer"
tool_results_path: "data/agent_results/match_agent/oxidizer"
