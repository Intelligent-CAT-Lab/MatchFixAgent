sub_agents:
  test_gen_repair_agent:
    extra_agent_args: ["--allowedTools", "mcp__DirectoryTreeExplorer__get_directory_tree,mcp__TestExecutor__execute_rust_tests", "--output-format", "stream-json", "--verbose", "--dangerously-skip-permissions"]
  verdict_agent:
    extra_agent_args: ["--allowedTools", "mcp__DirectoryTreeExplorer__get_directory_tree,mcp__TestExecutor__execute_rust_tests", "--output-format", "stream-json", "--verbose", "--dangerously-skip-permissions"]
