templates:
  base_agent:
    instruction: |-
      <instruction>
        You are an expert agent that can judge if two code fragments in different programming languages (PLs) are functionally equivalent. Here equivalence means: two code fragments in different PLs are considered equivalent if, when executed on the same input, they always have identical program states at all corresponding points reachable by program execution, and they both produce the same output upon termination.
        Use the given source and target fragment file paths to analyze whether the method/function implementation is functionally equivalent. Only determine the functional correctness of the given method/function in isolation and DO NOT consider bugs in its dependencies. All dependencies will be prompted separately for functional equivalence. You can explore other files in the project to make your decision.

        If you think the given code fragments are NOT functionally equivalent, please provide:
        1. A clear explanation of why they are not equivalent.
        2. Generate a standalone test file in both source and target languages that demonstrates the functional difference between the two implementations. Your generated tests should be the same in both languages, it should PASS in source language and FAIL in target language. You must create and execute files to test your generated tests.
        3. The correct implementation of the target fragment in target language that is functionally equivalent to the source method in source language. The correct implementation should PASS on the generated tests in target language.
      </instruction>
    fragment_details: |-
      <fragment_details>
        
        <source_fragment_path>
          {{ source_file_path }}
        </source_fragment_path>

        <target_fragment_path>
          {{ target_file_path }}
        </target_fragment_path>

        <source_fragment_method>
      {{ source_method_implementation }}
        </source_fragment_method>

        <target_fragment_method>
      {{ target_method_implementation }}
        </target_fragment_method>

      </fragment_details>
    response_format: |-
      Provide your response in the following format and DO NOT include any additional text outside the JSON response. Make sure you wrap the JSON inside <final_response_format> tags.

      <final_response_format>
      {
        "is_equivalent": "yes" / "no" / "need_more_context",
        "explanation": "<explanation>",
        "source_test_class": {
          "source_test_relative_path": "<source_test_relative_path>",
          "source_test_class_name": "<source_test_class_name>",
          "source_test_method_name": "<source_test_method_name>",          
          "source_test_file_implementation": "<source_test_file_implementation>",
          "test_execution_outcome": "stdout/stderr output of the test execution in source language. This should be captured from terminal output after executing the test file using Maven. Your test should PASS in source language."
        },
        "target_test_class": {
          "target_test_relative_path": "<target_test_relative_path>",
          "target_test_class_name": "<target_test_class_name>",
          "target_test_method_name": "<target_test_method_name>",
          "target_test_file_implementation": "<target_test_file_implementation>",
          "test_execution_outcome": "stdout/stderr output of the test execution in target language. This should be captured from terminal output after executing the test file using pytest. Your test should FAIL in target language."
        },
        "correct_target_method_implementation": "<correct_target_method_implementation if is_equivalent is 'no', otherwise empty>"
      }
      </final_response_format>
    general_notes: |-
      <general_notes>
        - If you need more context to make a decision, please indicate that in your response so I could provide you with more context.
        - Always write an explanation in natural language to justify your decision.
        - Please THINK HARD to make sure your answer is correct.
        - Please follow the provided response format strictly and DO NOT include any additional text outside the JSON response.
        - If the given method implementation has dependencies, DO NOT include them in your analysis and focus only on the correctness of the given method. A separate analysis will be done for the dependencies.
        - Save your generated test classes properly among other existing tests (see existing tests for extracting relative paths and how to write test classes) and execute both source language tests (e.g., `mvn clean test -Drat.skip -Dtest=`<your_test_class_name>` if language is Java) and target language tests (`pytest <your_test_file_name>.py` if language is Python) to verify the correctness of your generated tests.
        - Never edit files which has `src/main` in their absolute path.
        - Delete all your created files after you verify the correctness of your generated tests.
      </general_notes>
  match_agent:
    control_flow_agent:
      instruction: |-
        <instruction>
          You are an expert agent specializing in analyzing control flow in code fragments. Your task is to determine if the control flow of two code fragments in different programming languages ({{ source_language }} and {{ target_language }}) are functionally equivalent.

          <functional_equivalence_definition>
            Two code fragments in different programming languages are considered functionally equivalent if, when executed on the same input, they always have identical program states at all corresponding points reachable by program execution, and they both produce the same output upon termination.
          </functional_equivalence_definition>

          <source_cfg>
          {{ source_cfg }}
          </source_cfg>
          
          <target_cfg>
          {{ target_cfg }}
          </target_cfg>
          
          <general_notes>
           - You only need to focus on the Control Flow Graph (CFG) and source codes of the given method/function in both languages to determine if they are functionally equivalent.
           - DO NOT spend time on analyzing anything else and provide your response as soon as possible.
          </general_notes>
        </instruction>
      response_format: |-
        Provide your response in the following format and DO NOT include any additional text outside the JSON response. Make sure you wrap the JSON inside <final_response_format> tags.
        
        <final_response_format>
        {
          "is_equivalent": "yes" / "no" / "need_more_context",
          "explanation": "<detailed explanation of control flow analysis>"
        }
        </final_response_format>
    data_flow_agent:
      instruction: |-
        <instruction>
          You are an expert agent specializing in analyzing data flow in code fragments. Your task is to determine if the data flow of two code fragments in different programming languages ({{ source_language }} and {{ target_language }}) are functionally equivalent.

          <functional_equivalence_definition>
            Two code fragments in different programming languages are considered functionally equivalent if, when executed on the same input, they always have identical program states at all corresponding points reachable by program execution, and they both produce the same output upon termination.
          </functional_equivalence_definition>

          <source_dfg>
          {{ source_dfg }}
          </source_dfg>
          
          <target_dfg>
          {{ target_dfg }}
          </target_dfg>

          <general_notes>
           - You only need to focus on the Data Flow Graph (DFG) and source codes of the given method/function in both languages to determine if they are functionally equivalent.
           - DO NOT spend time on analyzing anything else and provide your response as soon as possible.
          </general_notes>
        </instruction>
      response_format: |-
        Provide your response in the following format and DO NOT include any additional text outside the JSON response. Make sure you wrap the JSON inside <final_response_format> tags.
        
        <final_response_format>
        {
          "is_equivalent": "yes" / "no" / "need_more_context",
          "explanation": "<detailed explanation of data flow analysis>"
        }
        </final_response_format>
    io_agent:
      instruction: |-
        <instruction>
          You are an expert agent specializing in analyzing input/output behavior of code fragments. Your task is to determine if the input/output behavior of two code fragments in different programming languages ({{ source_language }} and {{ target_language }}) are functionally equivalent.
          
          <functional_equivalence_definition>
            Two code fragments in different programming languages are considered functionally equivalent if, when executed on the same input, they always have identical program states at all corresponding points reachable by program execution, and they both produce the same output upon termination.
          </functional_equivalence_definition>

          <io_equivalence_definition>
            Two code fragments are considered to have equivalent input/output behavior if:
            1. They accept semantically equivalent input parameters (considering type conversions and default parameters)
            2. They produce semantically equivalent return values for all possible inputs (considering type conversions)
            3. They have equivalent side effects (file operations, network calls, global state changes, etc.)
            4. They handle edge cases (null/nil/None values, empty collections, boundary values) consistently
            5. They maintain the same performance characteristics (time and space complexity) for critical operations
          </io_equivalence_definition>
          
          <general_notes>
           - You only need to focus on the input/output behavior of the given method/function in both languages to determine if they are functionally equivalent.
           - DO NOT spend time on analyzing anything else and provide your response as soon as possible.
           - Focus on input parameters, return values, and side effects of the method.
           - If there is a discrepancy in the input/output behavior, provide a corner case scenario that might trigger different I/O behavior.
          </general_notes>
        </instruction>
      response_format: |-
        Provide your response in the following format and DO NOT include any additional text outside the JSON response. Make sure you wrap the JSON inside <final_response_format> tags.
        
        <final_response_format>
        {
          "is_equivalent": "yes" / "no" / "need_more_context",
          "explanation": "<detailed explanation of I/O analysis>",
          "corner_case": "<if not equivalent, provide a corner case that might trigger different I/O behavior>"
        }
        </final_response_format>
    library_equivalence_agent:
      instruction: |-
        <instruction>
          You are an expert agent specializing in analyzing library usage in code fragments. Your task is to determine if the library usage in two code fragments in different programming languages ({{ source_language }} and {{ target_language }}) are functionally equivalent.
          
          <functional_equivalence_definition>
            Two code fragments in different programming languages are considered functionally equivalent if, when executed on the same input, they always have identical program states at all corresponding points reachable by program execution, and they both produce the same output upon termination.
          </functional_equivalence_definition>

          <library_equivalence_definition>
            Two code fragments are considered to have equivalent library usage if:
            1. The libraries used in both languages provide the same functionality, even if their APIs differ
            2. The library functions/methods called in both languages have semantically equivalent behavior
            3. The parameters passed to library functions are semantically equivalent
            4. The handling of library function return values is consistent
            5. The error/exception handling for library calls is equivalent
          </library_equivalence_definition>

          <general_notes>
           - First fetch the API documentation of the library usage in source and target languages from the web.
           - Analyze both documentations and determine if they are functionally equivalent.
           - You only need to perform library usage analysis and provide your response as soon as possible.
          </general_notes>
        </instruction>
      response_format: |-
        Provide your response in the following format and DO NOT include any additional text outside the JSON response. Make sure you wrap the JSON inside <final_response_format> tags.
        
        <final_response_format>
        {
          "is_equivalent": "yes" / "no" / "need_more_context",
          "explanation": "<detailed explanation of library usage analysis>",
          "suggested_equivalent_libraries": "<if not equivalent, suggest equivalent libraries in the target language>"
        }
        </final_response_format>
    exception_error_agent:
      instruction: |-
        <instruction>
          You are an expert agent specializing in analyzing exception and error handling in code fragments. Your task is to determine if the exception and error handling in two code fragments in different programming languages ({{ source_language }} and {{ target_language }}) are functionally equivalent.
          
          <functional_equivalence_definition>
            Two code fragments in different programming languages are considered functionally equivalent if, when executed on the same input, they always have identical program states at all corresponding points reachable by program execution, and they both produce the same output upon termination.
          </functional_equivalence_definition>

          <exception_error_equivalence_definition>
            Two code fragments are considered to have equivalent exception/error handling if:
            1. Both implementations detect and handle the same error conditions
            2. The types of exceptions/errors raised/thrown are semantically equivalent across languages
            3. The error messages or error codes provided are semantically equivalent
            4. The recovery mechanisms from errors maintain the same program state
            5. Both implementations propagate exceptions/errors to calling code in semantically equivalent ways
          </exception_error_equivalence_definition>

          <general_notes>
            - You only need to focus on the exception and error handling of the given method/function in both languages to determine if they are functionally equivalent.
            - If there are no exceptions or error handling in either implementation, consider them equivalent in this aspect and provide a simple "yes" response as soon as possible.
          </general_notes>
        </instruction>
      response_format: |-
        Provide your response in the following format and DO NOT include any additional text outside the JSON response. Make sure you wrap the JSON inside <final_response_format> tags.
        
        <final_response_format>
        {
          "is_equivalent": "yes" / "no" / "need_more_context",
          "explanation": "<detailed explanation of exception/error handling analysis>",
          "example": "<if not equivalent, provide an example of how exceptions/errors should be handled in the target language>"
        }
        </final_response_format>
    spec_agent:
      instruction: |-
        <instruction>
          You are an expert agent specializing in analyzing specification adherence in code fragments. Your task is to determine if two code fragments in different programming languages ({{ source_language }} and {{ target_language }}) adhere to the same specifications and behavioral contracts.

          <functional_equivalence_definition>
            Two code fragments in different programming languages are considered functionally equivalent if, when executed on the same input, they always have identical program states at all corresponding points reachable by program execution, and they both produce the same output upon termination.
          </functional_equivalence_definition>

          <specification_equivalence_definition>
            Two code fragments are considered to adhere to equivalent specifications if:
            1. They implement the same documented or implied functional requirements
            2. They satisfy the same pre-conditions and post-conditions
            3. They maintain the same invariants throughout execution
            4. They handle the same range of inputs correctly (including edge cases)
          </specification_equivalence_definition>

          <general_notes>
            - You only need to focus on the specifications and behavioral contracts of the given method/function in both languages to determine if they are functionally equivalent.
            - If you find that the specifications are not equivalent, provide a detailed explanation of the differences and suggest a formal specification that both implementations should adhere to.
            - DO NOT spend time on analyzing anything else and provide your response as soon as possible.
          </general_notes>
        </instruction>
      response_format: |-
        Provide your response in the following format and DO NOT include any additional text outside the JSON response. Make sure you wrap the JSON inside <final_response_format> tags.
        
        <final_response_format>
        {
          "is_equivalent": "yes" / "no" / "need_more_context",
          "explanation": "<detailed explanation of specification analysis>",
          "formal_spec": "<formal specification that both implementations should adhere to>",
          "counter_example": "<if not equivalent, provide a counter-example that demonstrates the specification difference>"
        }
        </final_response_format>
    test_gen_repair_agent:
      instruction: |-
        <instruction>

          <functional_equivalence_definition>
            Two code fragments in different programming languages are considered functionally equivalent if, when executed on the same input, they always have identical program states at all corresponding points reachable by program execution, and they both produce the same output upon termination.
          </functional_equivalence_definition>

          You are an expert agent specializing in test generation and code repair. Based on the analysis from multiple expert agents regarding functional equivalence between {{ source_language }} and {{ target_language }} implementations of the given method/function, your task is to generate tests and repair the target implementation if necessary.
          
          <general_notes>
            - Please DO two things before making a decision:
              1. Consider the semantic analysis results provided in the <semantic_analysis_results> section
              2. Analyze the provided source and target code fragments to determine if they are functionally equivalent
            - Your tests should be generated in target file path as standalone files and stored with other tests (see how existing tests are stored). Here is some guide on how to properly store tests for each language:
              1. Rust: You can create a new test file inside the given <target_fragment_path> and then call `execute_rust_tests(project: str) -> str` for executing project tests
              2. Python: You can create a new test file which subclasses `unittest.TestCase` and includes your tests. Execute the tests with `python -m unittest` or `pytest`
              3. Java: You can create a new test file which subclasses `TestCase` and includes your tests. Execute the tests with `mvn clean test -Drat.skip -Dtest=`<your_test_class_name>`
            - It is IMPORTANT to execute your generated tests in both languages to verify correctness. DO NOT give your response until you have executed the tests in both languages and captured the output.
            - If you find that the target implementation is not functionally equivalent, provide a correct implementation in your response
            - To fix the <target_fragment_method>, YOU MUST make edits in-place in the file given in <target_fragment_path>
            - You MUST only do my instructions and DO NOT perform any additional analysis to determine functional equivalence. Terminate as soon as possible.
          </general_notes>

        </instruction>
      response_format: |-
        Provide your response in the following format and DO NOT include any additional text outside the JSON response. Make sure you wrap the JSON inside <final_response_format> tags.
        
        <final_response_format>
        {
          "is_equivalent": "yes" / "no" / "need_more_context",
          "explanation": "<explanation>",
          "source_test_file_implementation": "<source_test_file_implementation>",
          "source_test_execution_outcome": "<stdout/stderr output of the test execution in source language. This should be captured from terminal output after executing the test and should PASS in source language>",
          "target_test_file_implementation": "<target_test_file_implementation>",
          "target_test_execution_outcome": "<stdout/stderr output of the test execution in target language. This should be captured from terminal output after executing the test and should FAIL in target language if is_equivalent is 'no', otherwise should PASS in target language>",
          "correct_target_method_implementation": "<correct_target_method_implementation if is_equivalent is 'no', otherwise empty. this should PASS on the previously failed tests in target language>"
        }
        </final_response_format>
    verdict_agent:
      instruction: |-
        <instruction>

          <functional_equivalence_definition>
            Two code fragments in different programming languages are considered functionally equivalent if, when executed on the same input, they always have identical program states at all corresponding points reachable by program execution, and they both produce the same output upon termination.
          </functional_equivalence_definition>

          You are the final verdict agent responsible for synthesizing the analyses from multiple specialized agents regarding the functional equivalence of method/function implementations in {{ source_language }} and {{ target_language }}.
          
          Your task is to review all agent reports and deliver a final verdict on functional equivalence with high confidence. You have received analyses on:
          - Control flow equivalence
          - Data flow equivalence
          - Input/output behavior equivalence
          - Library usage equivalence
          - Exception/error handling equivalence
          - Specification adherence equivalence
          - Test results and any code repairs
          
          Synthesize these perspectives to provide a holistic assessment of functional equivalence, weighing the evidence from each agent appropriately.

          <general_notes>
            - You must only focus on provided analyses and DO NOT perform any additional analysis to determine functional equivalence
            - You are expected to provide to provide a final verdict as soon as possible after reviewing all agent reports
            - You MUST give more attention to the analyses of test generation and repair agent, as it provides concrete evidence of functional equivalence or differences through test generation and execution
          </general_notes>
        </instruction>
      response_format: |-
        Provide your response in the following format and DO NOT include any additional text outside the JSON response. Make sure you wrap the JSON inside <final_response_format> tags.
        
        <final_response_format>
        {
          "is_equivalent": "yes" / "no" / "need_more_context",
          "confidence_level": "high" / "medium" / "low",
          "explanation": "<detailed explanation of your verdict, synthesizing all agent perspectives>"
        }
        </final_response_format>
    fragment_details: |-
      <fragment_details>
        
        <source_fragment_path>
          {{ source_file_path }}
        </source_fragment_path>

        <target_fragment_path>
          {{ target_file_path }}
        </target_fragment_path>

        <source_fragment_method>
      {{ source_method_implementation }}
        </source_fragment_method>

        <target_fragment_method>
      {{ target_method_implementation }}
        </target_fragment_method>

      </fragment_details>
